<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Hóa đơn thanh toán</title>
		<meta charset = "utf-8">
		
	</head>
	<body>
		<div class = "container">
            <table border = "1">
				<tr>
					<th>STT</th>
					<th>Tên sản phẩm</th>
					<th>Đơn giá</th>
					<th>Số lượng</th>
					<th>Đơn vị tính</th>
					<th>Thành tiền</th>
				</tr>
				<tr>
					<td>1</td>
					<td>A</td>
					<td class = "dongia">50</td>
					<td class = "soluong">10</td>
					<td>thùng</td>
					<td class = "thanhtien">?</td>
				</tr>
				<tr>
					<td>2</td>
					<td>B</td>
					<td class = "dongia">70</td>
					<td class = "soluong">20</td>
					<td>bao</td>
					<td class = "thanhtien">?</td>
				</tr>
				<tr>
					<td>3</td>
					<td>C</td>
					<td class = "dongia">20</td>
					<td class = "soluong">30</td>
					<td>túi</td>
					<td class = "thanhtien">?</td>
				</tr>
				<tr>
					<td colspan="5">Tổng thanh toán</td>
					<td id="thanhtoan">?</td>
				</tr>
			</table>
		</div>
		<script>
			const soluong = document.getElementsByClassName("soluong");
			const dongia = document.getElementsByClassName("dongia");
			const thanhtien = document.getElementsByClassName("thanhtien");
				let i = 0; let thanhtoan = 0;
				while(i  < soluong.length){
					thanhtien[i].innerHTML = Number(soluong[i].innerHTML)*Number(dongia[i].innerHTML);
					thanhtoan += Number(thanhtien[i].innerHTML);
					i++;
				}
				document.getElementById("thanhtoan").innerHTML =  thanhtoan;
		</script>
	</body>	
</html>
